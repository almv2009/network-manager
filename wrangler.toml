name = "network-manager"
compatibility_date = "2026-04-01"
pages_build_output_dir = "./dist"

[vars]
APP_BASE_URL = "https://network.ataconsultancy.network"
STRIPE_SUCCESS_URL = "https://network.ataconsultancy.network/?billing=success"
STRIPE_CANCEL_URL = "https://network.ataconsultancy.network/?billing=cancelled"
TENANT_DEFAULT_ID = "local"
TENANT_ALLOW_HEADER_OVERRIDE = "0"
TENANT_HEADER_NAME = "x-sgt-tenant-id"
TENANT_STRICT_RESOLUTION = "0"
TENANT_BASE_HOSTS = "network.ataconsultancy.network"
TENANT_TRUSTED_CLAIM_HEADER = "x-sgt-auth-tenant"
TENANT_DEFAULT_AUTH_MODE = "local_vendor"
TENANT_DEFAULT_DATABASE_MODE = "d1"
TENANT_DEFAULT_STORAGE_MODE = "r2"
TENANT_DEFAULT_D1_BINDING = "DB"
TENANT_DEFAULT_R2_BINDING = "DOCUMENTS_BUCKET"
TENANT_DEFAULT_EXTERNAL_DB_CONNECTION = ""
TENANT_DEFAULT_EXTERNAL_STORAGE_CONNECTION = ""
TENANT_CONFIG_JSON = ""
SESSION_TTL_HOURS = "168"
SUPPORT_EMAIL = "admin@ataconsultancy.net"
ENABLE_ALTERNATIVE_PAYMENTS = "true"
ALLOWED_ALTERNATIVE_PAYMENT_METHODS = "wise,e_transfer,cheque,eft"
INVITE_EMAIL_SENDER = "Safeguarding Together <noreply@ataconsultancy.network>"
ORGANIZATION_BRANDING_NAME = "Safeguarding Together Network Manager"
DOCUMENTS_STORAGE_PROVIDER = "r2"
TURNSTILE_ENFORCE_AUTH = "0"
TURNSTILE_ENFORCE_PUBLIC_POSTS = "0"

[[d1_databases]]
binding = "DB"
database_name = "network-manager-db"
database_id = "2d4baca9-e696-4177-992c-246bc9610b8d"
preview_database_id = "3b6a9b77-c13d-487a-ad50-eb51d10c5112"

[[r2_buckets]]
binding = "DOCUMENTS_BUCKET"
bucket_name = "network-manager-documents"
preview_bucket_name = "network-manager-documents-preview"
